name: Rebuild portfolio site

# When NeetCode auto-syncs a new solution (a push to this repo), tell the
# HanJunSeoJB.github.io site to rebuild immediately — so the portfolio
# reflects new solves within ~1 minute instead of waiting for its daily build.
#
# Requires a repository secret SITE_DISPATCH_TOKEN: a fine-grained PAT scoped
# to the HanJunSeoJB.github.io repo with "Actions: Read and write" permission.
# Until that secret exists, this job simply no-ops (stays green).
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: rebuild-site
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger site deploy
        env:
          TOKEN: ${{ secrets.SITE_DISPATCH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "SITE_DISPATCH_TOKEN not set yet — skipping site rebuild."
            echo "Add the token (see rebuild-site.yml header) to enable instant updates."
            exit 0
          fi
          echo "Dispatching deploy.yml on HanJunSeoJB.github.io…"
          code=$(curl -sS -o /dev/null -w '%{http_code}' -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/HanJunSeoJB/HanJunSeoJB.github.io/actions/workflows/deploy.yml/dispatches \
            -d '{"ref":"master"}')
          echo "GitHub API responded: HTTP $code"
          # 204 = success. Anything else is a real failure.
          [ "$code" = "204" ]
